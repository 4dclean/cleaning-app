<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>청소현장 자동화 - 동작 테스트</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <h1>청소현장 자동화 (동작 검증용)</h1>
      <p class="muted">
        우선순위: 특별 이벤트 → 월정기 → 기본(건물+요일)
      </p>

      <section class="card">
        <h2>1) 오늘 작업 정보</h2>
        <div class="grid two">
          <label>
            작업 일시
            <input id="workDateTime" type="datetime-local" />
          </label>
          <label>
            건물
            <select id="buildingSelect">
              <option value="백산빌딩">백산빌딩</option>
              <option value="효성빌딩">효성빌딩</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="loadChecklistBtn">오늘 체크리스트 불러오기</button>
        </div>
        <p id="sourceText" class="source"></p>
      </section>

      <section class="card">
        <h2>2) 체크리스트</h2>
        <div class="actions">
          <button id="checkAllBtn" type="button">모두확인</button>
          <button id="uncheckAllBtn" type="button">모두해제</button>
        </div>
        <ul id="checklistItems" class="checklist"></ul>
      </section>

      <section class="card">
        <h2>3) 고정 촬영 (전/후)</h2>
        <div class="grid two">
          <div class="photo-row">
            <label>화장실 전</label>
            <input class="hidden-file" id="photoToiletBefore" type="file" accept="image/*" capture="environment" />
            <button class="capture-btn" type="button" data-target="photoToiletBefore">사진 촬영</button>
            <span class="photo-status" data-status-for="photoToiletBefore">미촬영</span>
          </div>
          <div class="photo-row">
            <label>화장실 후</label>
            <input class="hidden-file" id="photoToiletAfter" type="file" accept="image/*" capture="environment" />
            <button class="capture-btn" type="button" data-target="photoToiletAfter">사진 촬영</button>
            <span class="photo-status" data-status-for="photoToiletAfter">미촬영</span>
          </div>
          <div class="photo-row">
            <label>1층 복도 전</label>
            <input class="hidden-file" id="photoHallBefore" type="file" accept="image/*" capture="environment" />
            <button class="capture-btn" type="button" data-target="photoHallBefore">사진 촬영</button>
            <span class="photo-status" data-status-for="photoHallBefore">미촬영</span>
          </div>
          <div class="photo-row">
            <label>1층 복도 후</label>
            <input class="hidden-file" id="photoHallAfter" type="file" accept="image/*" capture="environment" />
            <button class="capture-btn" type="button" data-target="photoHallAfter">사진 촬영</button>
            <span class="photo-status" data-status-for="photoHallAfter">미촬영</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>4) 추가 사진</h2>
        <div id="extraPhotos"></div>
        <div class="actions">
          <button id="addExtraPhotoBtn" type="button">추가 사진 칸 만들기</button>
        </div>
      </section>

      <section class="card">
        <h2>5) 규칙 설정 (테스트 데이터)</h2>

        <h3>기본 규칙 (건물+요일)</h3>
        <div id="defaultRules"></div>
        <div class="actions">
          <button id="addDefaultRuleBtn" type="button">기본 규칙 추가</button>
        </div>

        <h3>월정기 규칙</h3>
        <div id="monthlyRules"></div>
        <div class="actions">
          <button id="addMonthlyRuleBtn" type="button">월정기 규칙 추가</button>
        </div>

        <h3>특별 이벤트 규칙</h3>
        <div id="eventRules"></div>
        <div class="actions">
          <button id="addEventRuleBtn" type="button">특별 이벤트 규칙 추가</button>
        </div>

        <div class="actions">
          <button id="saveRulesBtn" type="button">규칙 저장</button>
          <button id="resetRulesBtn" type="button">규칙 초기화</button>
        </div>
      </section>

      <section class="card">
        <h2>6) 오늘 기록 저장</h2>
        <p class="muted">
          브라우저 보안상 실제 구글드라이브 저장은 이 데모에서 하지 않고, 파일명/경로 생성만 검증합니다.
        </p>
        <div class="grid two">
          <label>
            구글시트 웹앱 주소
            <input id="sheetWebhookUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
          </label>
          <label>
            연동 상태
            <input id="sheetStatus" type="text" value="미연결" readonly />
          </label>
        </div>
        <div class="actions">
          <button id="saveSheetUrlBtn" type="button">연동 주소 저장</button>
          <button id="saveTodayRecordBtn" type="button">오늘 기록 저장</button>
        </div>
        <pre id="resultBox" class="result"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
